<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>3D Test</title>
  <style>
    #webgl-cube {
      width: 400px;
      height: 400px;
      border: 2px solid red;
    }
  </style>
</head>
<body>
  <div id="webgl-cube"></div>

<script type="module">
  console.log("✅ Начинаю загрузку Three.js");

  import * as THREE from 'https://jsdelivr.com/three@0.160.0/build/three.module.js';
  import { GLTFLoader } from 'https://jsdelivr.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

  console.log("✅ Three.js загружен");

  const container = document.getElementById('webgl-cube');
  if (!container) {
    console.error("❌ Контейнер не найден");
    // ❌ Уберите return! Просто выйдите из скрипта через условие
  } else {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const loader = new GLTFLoader();
    loader.load(
      '/models/cube_certificate.glb',
      (gltf) => {
        scene.add(gltf.scene);
        console.log("✅ Модель загружена");
      },
      undefined,
      (error) => {
        console.error("❌ Ошибка загрузки модели:", error);
      }
    );

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();
  }
</script>
</body>
</html>
