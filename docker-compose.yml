networks:
    docker-wp-network:
        driver: bridge
        name: docker_wp_network

services:
    wp_nginx:
        container_name: wp_nginx
        build:
            context: ./
            dockerfile: docker/nginx/Dockerfile
        volumes:
            - ./wp:/var/www/wp
            - ./docker/nginx/conf.d:/etc/nginx/conf.d
        ports:
            - "80:80"
        expose:
            - 80
        networks:
            - docker-wp-network
        depends_on:
            site: { condition: service_started }

    site:
        container_name: site
        build:
            context: ./
            dockerfile: ./docker/php-fpm8.4/Dockerfile
        networks:
            - docker-wp-network
        volumes:
            - ./wp:/var/www/wp

    db_wp:
        image: mysql:5.7
        restart: always
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: 'wp_pass'
            MYSQL_DATABASE: 'wp'
            MYSQL_PASSWORD: 'wp_pass'
        networks:
            - docker-wp-network
        volumes:
            - ./docker/mysql/volume:/var/lib/mysql

    phpmyadmin:
        depends_on:
            - db_wp
        image: phpmyadmin
        restart: always
        ports:
            - "8090:80"
        environment:
            PMA_HOST: db_wp
            PMA_USER: root
            PMA_PASSWORD: 'wp_pass'
            PMA_PORT: 3306
        networks:
            - docker-wp-network